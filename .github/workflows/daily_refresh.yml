name: Daily USAspending Refresh

# 11:00 UTC ≈ 07:00 America/New_York. The refresh computes the current date in
# ET internally regardless of when the runner fires.
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab

permissions:
  contents: write              # allow committing refreshed data back to the repo

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the commit step can rebase

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh
        run: python refresh.py

      - name: Commit refreshed data
        run: |
          git config user.name  "oem-tracker-bot"
          git config user.email "actions@github.com"
          git add -f data/processed/all_awards_processed.csv \
                     data/processed/all_awards_processed.parquet \
                     data/processed/data_quality.json \
                     data/processed/unmapped_candidates.csv \
                     data/processed/rejected_records.csv \
                     data/logs/refresh_log.csv
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Daily refresh $(date -u +%Y-%m-%d)"
          # Survive any change that landed on main during the long run:
          # rebase our regenerated data on top of remote and retry the push.
          branch="${GITHUB_REF_NAME}"
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push rejected; syncing with remote and retrying ($i)..."
            git pull --rebase -X theirs origin "${branch}" || git rebase --abort || true
            sleep $((RANDOM % 5 + 3))
          done
          echo "push failed after retries"; exit 1
